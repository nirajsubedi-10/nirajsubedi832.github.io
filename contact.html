                </div>
            </div>

            <!-- Navigation -->
           <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="index.html" class="nav-link">Home</a>

            <div class="flex items-center gap-4">

                <button class="md:hidden text-3xl menu-btn">☰</button>

        </div>
    </header>

    <!-- HERO BANNER -->
    <section class="hero-bg" style="background-image: linear-gradient(rgba(0,48,135,0.8), rgba(0,48,135,0.8)), url('https://picsum.photos/id/870/1920/1080'); height: 320px;">
        <div class="max-w-7xl mx-auto px-6 text-center pt-20">
            <h2 class="hero-title">Contact Us</h2>
            
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <div class="max-w-6xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-2 gap-12">
        
        <!-- Contact Form -->
        <div class="bg-white rounded-3xl shadow p-10">
            <h3 class="text-3xl font-bold text-[#003087] mb-8">Send us a Message</h3>
            
            <form>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" placeholder="Your Full Name" 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#003087] text-lg">
                    
                    <input type="text" placeholder="Phone / Email" 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#003087] text-lg">
                </div>
                
                <textarea placeholder="Your Message (e.g. enquiry about admission, fee, etc.)" 
                          rows="7"
                          class="w-full mt-6 px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#003087] text-lg"></textarea>
                
                <button type="button" 
                    
                        class="mt-8 w-full bg-[#DA291C] hover:bg-red-700 text-white py-5 rounded-full text-xl font-medium transition">
                    Send Message
                </button>
            </form>
        </div>

        <!-- Contact Details + Map -->
        <div class="space-y-8">
            
            <!-- Details Card -->
            <div class="bg-white rounded-3xl shadow p-10">
                <h4 class="font-bold text-2xl mb-8 text-[#003087]">Get in Touch</h4>
                <div class="space-y-8">
                    <div class="flex gap-5">
                        <span class="text-4xl">📍</span>
                        <div>
                            <strong class="block text-lg">Address</strong>

                        </div>
                    </div>
                    
                    <div class="flex gap-5">
                        <span class="text-4xl">📞</span>
                        <div>
                            <strong class="block text-lg">Phone</strong>
                            <p class="text-gray-600">
                                +977-024-521234<br>
                                +977-984-1234567 (Principal)
                            </p>
                        </div>
                    </div>
                    
                    <div class="flex gap-5">
                        <span class="text-4xl">✉️</span>
                        <div>
                            <strong class="block text-lg">Email</strong>
                            <p class="text-gray-600">phidimss@gmail.com</p>
                        </div>
                    </div>
                </div>
            </div>

                            <div class="p-5 text-center text-sm bg-gray-50">
